<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f0fff5;
}

header{
background:#198754;
color:white;
padding:40px;
text-align:center;
}

</style>

</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<div class="container mt-4">

<div class="row">

<div class="col-md-4">
<h4>Address</h4>
<p>Delhi, India</p>
</div>

<div class="col-md-4">
<h4>Email</h4>
<p>example@gmail.com</p>
</div>

<div class="col-md-4">
<h4>Phone</h4>
<p>9876543210</p>
</div>

</div>

<hr>

<h3>Send Message</h3>

<form>

<input class="form-control mb-3" placeholder="Your Name">

<input class="form-control mb-3" placeholder="Email">

<textarea class="form-control mb-3" placeholder="Message"></textarea>

<button class="btn btn-success">Submit</button>

</form>

</div>

</body>
</html>
