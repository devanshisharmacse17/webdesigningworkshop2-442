<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attractive Bootstrap Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
        }
        .card-custom {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">My Website</a>
        </div>
    </nav>

    <!-- Main Section -->
    <div class="container d-flex justify-content-center align-items-center" style="height: 90vh;">
        
        <div class="card card-custom p-5 text-center bg-white text-dark">
            
            <!-- Heading -->
            <h1 class="mb-3 text-primary">Welcome 🎉</h1>

            <!-- Paragraph -->
            <p class="lead">
                This is a beautifully designed webpage using Bootstrap. 
                It is responsive, modern, and easy to create!
            </p>

            <!-- Buttons -->
            <div class="mt-4">
                <button class="btn btn-primary btn-lg me-2">Get Started</button>
                <button class="btn btn-outline-secondary btn-lg">Learn More</button>
            </div>

        </div>
    </div>

</body>
</html>
